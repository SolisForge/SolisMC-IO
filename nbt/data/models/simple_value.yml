# -----------------------------------------------------------------------------
# Simple value struct
# -----------------------------------------------------------------------------
view: value_struct
imports:
  - byte_cvt.py
parameters:
  - pack_fmt
  - value_type
fields:
  name_upper: $( '${name}'.upper() )
  bytes: $( byte_cvt.value_to_bytes(${value}, '${pack_fmt}') )
  bytes_str: $( byte_cvt.byte_to_array(${bytes}) )
  n_bytes: $( len(${bytes}) )
formats:
  "name_upper": "{}"
  "value": "{}"
  "value_type": "{}"
  "bytes_str": "{}"
start_lines:
  - "#include <cstdint>"
